      "NW*":            [  68.64,  56.70 ]
      "SE*":            [  68.64,  56.70 ]
      "SW*":            [  68.64,  56.70 ]

      "N*":             [ 219.84,  56.70 ]
      "E*":             [  68.64, 219.24 ]
      "S*":             [ 219.84,  56.70 ]
