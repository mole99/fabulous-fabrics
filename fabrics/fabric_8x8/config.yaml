meta:
  version: 2
  flow: FABulousFabric
  substituting_steps:
    # Save some time
    Magic.DRC: null
    KLayout.DRC: null

# No antenna repair - we don't have
# standard cells at the top-level
GRT_ANTENNA_REPAIR_ITERS: 0
DRT_ANTENNA_REPAIR_ITERS: 0

# Basics
DESIGN_NAME: eFPGA
VERILOG_FILES: []

# No extract-unique, because the power straps
# are connected in the top-level integration
MAGIC_EXT_UNIQUE: notopports

# Unfortunately needed
GRT_ALLOW_CONGESTION: true

# FABulous config
FABULOUS_FABRIC_CONFIG: dir::fabric_8x8.csv
FABULOUS_TILE_LIBRARY: dir::../../ip/fabulous-tiles/tiles/

FABULOUS_TILE_SPACING: 0
FABULOUS_HALO_SPACING: [ 0, 0, 0, 0 ]

# Use the minimum length for pins
# that satisfies the minimum area constraint
IO_PIN_H_LENGTH: null
IO_PIN_V_LENGTH: null

# Save on file space by sharing same cells
PRIMARY_GDSII_STREAMOUT_TOOL: klayout
#KLAYOUT_CONFLICT_RESOLUTION: SkipNewCell
    
# Clock
CLOCK_PERIOD: 20
CLOCK_PORT: UserCLK

# PDK specific
pdk::sky130*:
    # Routing
    RT_MAX_LAYER: met4

    FABULOUS_TILE_SIZES:
      LUT4x8_C:         [ 210.80, 223.04 ]

      "NE*":            [  56.12,  57.12 ]
      "NW*":            [  56.12,  57.12 ]
      "SE*":            [  56.12,  57.12 ]
      "SW*":            [  56.12,  57.12 ]

      "N*":             [ 210.80,  57.12 ]
      "E*":             [  56.12, 223.04 ]
      "S*":             [ 210.80,  57.12 ]
      "W*":             [  56.12, 223.04 ]

