name: CI

# Events that trigger the workflow
on:
  # Runs on all pushes to branches
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  # Runs on all PRs
  pull_request:
  # Manual Dispatch
  workflow_dispatch:

concurrency:
  # Behavior:
  # - Group all pull requests: latest push cancels previous ones
  # - Group all branches:
  #   - If main/version- branches: run serially
  #   - Else, latest push cancels previous ones
  group: >
    ${{
      (github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)) ||
      (github.event_name == 'push' && format('branch-{0}', github.ref_name)) ||
      ''
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || !(startsWith(github.ref_name, 'version-') || github.ref_name == 'main' || github.ref_name == 'dev') }}

jobs:
  tiles:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        pdk: [gf180mcuD, ihp-sg13g2]
    name: Implement the Tiles (${{ matrix.pdk }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          token: ${{ secrets.ACCESS_TOKEN }}
      - name: Setup Nix
        uses: ./.github/actions/setup_nix
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          nix_cache_domain: ${{ vars.NIX_CACHE }}
          nix_public_key: ${{ vars.NIX_PUBLIC_KEY }}
      - name: Build with Nix
        uses: ./.github/actions/build_nix
        with:
          nix_system: x86_64-linux
          derivation: github:mole99/librelane_plugin_fabulous
      - name: Cache the tiles
        uses: actions/cache@v5
        with:
          path: ip/fabulous-tiles/tiles
          key: cache-${{ matrix.pdk }}-tiles
      - name: Implement the tiles
        run: |
          PDK=${{ matrix.pdk }} nix develop --command bash -c "cd ip/fabulous-tiles/ && make all"
      
  fabrics:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        pdk: [gf180mcuD, ihp-sg13g2]
    name: Stitch the Fabrics (${{ matrix.pdk }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          token: ${{ secrets.ACCESS_TOKEN }}
      - name: Setup Nix
        uses: ./.github/actions/setup_nix
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          nix_cache_domain: ${{ vars.NIX_CACHE }}
          nix_public_key: ${{ vars.NIX_PUBLIC_KEY }}
      - name: Build with Nix
        uses: ./.github/actions/build_nix
        with:
          nix_system: x86_64-linux
          derivation: github:mole99/librelane_plugin_fabulous
      - name: Restore the tiles
        uses: actions/cache/restore@v5
        with:
          path: ip/fabulous-tiles/tiles
          key: cache-${{ matrix.pdk }}-tiles
          fail-on-cache-miss: true
      - name: Stitch the tiles
        run: |
          PDK=${{ matrix.pdk }} nix develop --command make fabric_10x10
      - name: Upload Macro Folder
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: fabric_10x10_${{ matrix.pdk }}
          path: fabrics/fabric_10x10/macro/${{ matrix.pdk }}/
